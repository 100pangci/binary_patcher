name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_PATCHER_VERSION: ${{ github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: 运行 Windows 打包脚本
        shell: cmd
        run: |
          call scripts\build.bat

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: binary-patcher-windows-${{ github.ref_name || 'manual' }}
          path: |
            Releases/binary_patcher.exe
            Releases/apply_patch.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/binary-patcher-windows-${{ github.ref_name }}/binary_patcher.exe
            artifacts/binary-patcher-windows-${{ github.ref_name }}/apply_patch.exe
          generate_release_notes: true